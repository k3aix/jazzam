name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: registry.kube-registry.svc.cluster.local:5000

jobs:
  build:
    name: Build ${{ matrix.service.name }}
    runs-on: k3aix-runners
    strategy:
      matrix:
        service:
          - name: jazz-frontend
            context: frontend
          - name: jazz-standards
            context: backend/standards-service
          - name: jazz-search
            context: backend/search-service/SearchService

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          config-inline: |
            [registry."registry.kube-registry.svc.cluster.local:5000"]
              http = true
              insecure = true

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.context }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.service.name }}:${{ steps.meta.outputs.sha }}
            ${{ env.REGISTRY }}/${{ matrix.service.name }}:latest
